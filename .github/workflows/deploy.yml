name: Deploy App to Kubernetes
on:
  push:
    branches: [ develop ]
    tags: [ '1.0.0' ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Логін в Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Збірка образу (автоматично визначає тег: develop або 1.0.0)
      - name: Build and push
        run: |
          TAG=${GITHUB_REF_NAME}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/app:$TAG .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app:$TAG

      # 3. Розгортання через SSH на твою ВМ
      - name: Deploy to Minikube via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Створення namespace (якщо немає)
            NAMESPACE=${{ github.ref_type == 'tag' && 'release' || 'dev' }}
            PORT=${{ github.ref_type == 'tag' && '8003' || '8002' }}
            
            kubectl create namespace $NAMESPACE || true
            
            # Оновлення маніфесту (заміна змінних) та запуск
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/main/task3/deployment.yaml
            sed -i "s/{{ namespace }}/$NAMESPACE/g" deployment.yaml
            sed -i "s/{{ tag }}/$TAG/g" deployment.yaml
            sed -i "s/{{ port }}/$PORT/g" deployment.yaml
            
            kubectl apply -f deployment.yaml
